<div class="queue-header">
  <h2>Fila</h2>
  <div class="queue-header-actions">
    <button class="queue-icon-btn" id="queueShuffleBtn" title="Shuffle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><polyline points="4 20 21 3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/>
      </svg>
    </button>
    <button class="queue-icon-btn" id="queueCloseBtn" title="Fechar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
<div class="queue-list" id="queueList"></div>
