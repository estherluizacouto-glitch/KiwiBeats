<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Kiwi Beats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/biblioteca.css">
    <link rel="stylesheet" href="css/music-player.css">
    <link rel="stylesheet" href="css/lyrics-sidebar.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="page">
    <div class="bg-glow"></div>
    <div class="bg-grain"></div>

    <div class="container">
      <h1>Biblioteca</h1>

      <div id="music-list"></div>
      
    </div>
  </div>

  <!-- Modal de confirmação -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">
      <i data-lucide="trash-2"></i>
    </div>
    <h2 class="confirm-title">Deletar música</h2>
    <p class="confirm-subtitle">Tem certeza? Essa ação não pode ser desfeita.</p>
    <div class="confirm-buttons">
      <button class="confirm-cancel" id="confirmCancel">Cancelar</button>
      <button class="confirm-delete" id="confirmDelete">Deletar</button>
    </div>
  </div>
</div>

  
  <div id="sidebar-container"></div>
  <div id="music-player-container"></div>
  <div id="lyrics-sidebar"></div>
  <div id="queueSidebar"></div>
  

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/components.js"></script>
  <script src="js/music-player.js"></script>
  <script type="module" src="js/lyrics-sidebar.js"></script>
  <script type="module" src="js/biblioteca.js"></script>

</body>
</html>
