<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - KiwiBeats</title>
    <link rel="stylesheet" href="css/biblioteca.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="library-container">
    <header class="library-header">
        <h1>Biblioteca</h1>
    </header>

    <div class="song-list">
        <div class="song-item">
            <div class="song-info-left">
                <img src="capa1.png" alt="Capa" class="song-cover">
                <div class="song-details">
                    <span class="song-title">Posso até não te dar flores</span>
                    <span class="song-genre">Brazilian Funk Carioca 150 BPM</span>
                </div>
            </div>
            
            <div class="song-info-right">
                <span class="song-duration">01:55</span>
                <div class="menu-container">
                    <button class="menu-btn">•••</button>
                    <div class="dropdown-menu">
                        <button class="delete-opt">Excluir música</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="song-item">
            <div class="song-info-left">
                <img src="capa2.png" alt="Capa" class="song-cover">
                <div class="song-details">
                    <span class="song-title">Eu aplico o chá</span>
                    <span class="song-genre">Funk Brasileiro Estilo Minas Gerais</span>
                </div>
            </div>
            <div class="song-info-right">
                <span class="song-duration">01:29</span>
                <div class="menu-container">
                    <button class="menu-btn">•••</button>
                    <div class="dropdown-menu">
                        <button class="delete-opt">Excluir música</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
