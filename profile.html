<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/music-player.css">
  <link rel="stylesheet" href="css/lyrics-sidebar.css">
  <link rel="stylesheet" href="css/QueueSidebar.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="page">
    <div class="bg-glow"></div>
    <div class="bg-grain"></div>

    <!-- Sem sessão -->
    <div class="loading-wrap hidden" id="no-session">
      <p class="loading-text">Nenhuma sessão ativa.</p>
    </div>

    <!-- Conteúdo principal -->
    <div class="content hidden" id="content">

      <div class="profile-card">

        <!-- Avatar -->
        <div class="avatar-ring" id="avatar-ring"></div>

        <!-- Nome -->
        <div class="profile-info">
          <div class="name-row">
            <h1 class="profile-name" id="display-name">—</h1>
            <button class="edit-btn" title="Editar perfil">
              <i data-lucide="pencil"></i>
            </button>
          </div>

          <div class="stats-row">
            <div class="stat-chip">
              <span class="stat-value" id="stat-seguindo">0</span>
              <span class="stat-label">seguindo</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-chip">
              <span class="stat-value" id="stat-seguidores">0</span>
              <span class="stat-label">seguidores</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-chip">
              <span class="stat-value" id="stat-creditos">—</span>
              <span class="stat-label profile-credits-label">créditos</span>
            </div>
          </div>
        </div>

        <!-- Botão sair -->
        <button class="sign-out-btn" id="sign-out-btn">
          <i data-lucide="log-out"></i>
          Sair
        </button>

      </div>

      <!-- Área de conteúdo -->
      <main class="main">
        <div class="empty-state">
          <div class="empty-icon">
            <i data-lucide="music-2"></i>
          </div>
          <p class="empty-text">Nenhum dado ainda</p>
          <p class="empty-subtext">Comece a ouvir para ver suas estatísticas aqui.</p>
        </div>
      </main>

    </div>
  </div>

  <div id="sidebar-container"></div>
  <div id="music-player-container"></div>
  <div id="lyrics-sidebar"></div>
  <div id="queueSidebar" class="queue-sidebar">
    <div id="queueSidebarContainer"></div>
  </div>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/components.js"></script>
  <script src="js/music-player.js"></script>
  <script type="module" src="js/lyrics-sidebar.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
